<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Table - Restaurant System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Restaurant System - Waiter</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light">Change Role</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">Select Table</h2>
            </div>
        </div>
        <div class="row">
            {% for table in tables %}
            <div class="col-md-3 mb-4">
                <div class="card table-card {% if table.status == 'occupied' %}bg-warning{% elif table.status == 'reserved' %}bg-info{% else %}bg-success{% endif %}">
                    <div class="card-body text-center">
                        <h3 class="card-title">Table {{ table.number }}</h3>
                        <p class="card-text">Status: {{ table.status|title }}</p>
                        {% if table.status == 'available' %}
                        <a href="/waiter/order?table={{ table.number }}" class="btn btn-primary">Select Table</a>
                        {% elif table.status == 'occupied' %}
                        <a href="/waiter/order/{{ table.order_id }}" class="btn btn-warning">View Order</a>
                        {% else %}
                        <button class="btn btn-secondary" disabled>Reserved</button>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
